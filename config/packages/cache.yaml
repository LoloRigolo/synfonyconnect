framework:
    cache:
        # Filesystem adapter — données persistées entre déploiements.
        # Pour Redis : app: cache.adapter.redis + default_redis_provider: redis://localhost
        app: cache.adapter.filesystem

        pools:
            feed.cache:
                adapter: cache.app
                default_lifetime: 300 # 5 minutes (valeur par défaut, surchargeable par item)
                tags: true            # active le support des tags sur ce pool
